name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SCG.sln

      - name: Build
        run: dotnet build SCG.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish src/Presentation/SCG.API/SCG.API.csproj --configuration Release --no-build --output ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish
          retention-days: 5

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run unit tests
        run: dotnet test tests/SCG.UnitTests/SCG.UnitTests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: tests/SCG.UnitTests/TestResults/

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run architecture tests
        run: dotnet test tests/SCG.ArchitectureTests/SCG.ArchitectureTests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=arch-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arch-test-results
          path: tests/SCG.ArchitectureTests/TestResults/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run integration tests
        run: dotnet test tests/SCG.IntegrationTests/SCG.IntegrationTests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: tests/SCG.IntegrationTests/TestResults/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, architecture-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t scg-backend:${{ github.sha }} .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/scg-backend
          docker tag scg-backend:${{ github.sha }} $IMAGE:${{ github.sha }}
          docker tag scg-backend:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/scg
            docker compose pull backend
            docker compose up -d backend
            sleep 10
            curl -f http://localhost:8080/health/ready || echo "Health check failed"
